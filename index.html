<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume-EZ Dashboard</title>
<!-- Bootstrap and styling sheet link  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css\style.css">
</head>
<body class="d-flex flex-column min-vh-100">
<!-- Container for the changebale window size  -->
<header class="container-fluid border-bottom py-3">
    <div class="d-flex justify-content-between align-items-center">

<!-- Logo for the entire header of pages  -->
        <div class="d-flex align-items-center">
            <img src="images\RSE Logo.png" alt="RSE Logo" width="160" class="me-2">
        </div>

<!-- Nav bar functions and logos I made -->
        <div class="d-flex gap-4">

            <a href="index.html" class="nav-link-custom d-flex align-items-center">
                <img src="images/Dashboard Logo.png" width="40" class="me-1">
                <span>Dashboard</span>
            </a>

            <a href="details.html" class="nav-link-custom d-flex align-items-center">
                <img src="images/Application Details Icon.png" width="40" class="me-1">
                <span>Details</span>
            </a>

            <a href="addpage.html" class="nav-link-custom d-flex align-items-center">
                <img src="images/Plus Icon.png" width="30" class="me-1">
                <span>Add</span>
            </a>
        </div>

    </div>
</header>
<!-- Main contents and add button  -->
<main class="flex-grow-1">
    <div class="container text-center mb-4">
        <h2 class=" "text-center mb-4> Dashboard Overview </h2>
<!-- Dashboard table overview -->
        <table class="table table-bordered text-center">

            <thead>
                <tr>
                    <th>Company</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Details</th>
                </tr>
            </thead>

            <tbody id="job-table-body">
<!-- JS makes the table format correctly and display in the table here -->
            </tbody>
        </table>
        <a href="addpage.html" class="btn btn-primary">+ Add Application</a>
    </div>

    <div class="container">
        <div id="job-list" class="row"></div>
    </div>
</main>
    <script src="javascript\script.js"></script>

<footer class="container-fluid border-top py-2 mt-5">
    <div class="row align-items-center">

        <!-- LEFT -->
        <div class="col-4 d-flex align-items-center">
            <img src="images\RSE Logo.png" width="40" class="me-2">
            <small class="text-muted">Resume-EZ</small>
        </div>

        <!-- CENTER -->
        <div class="col-4 text-center">
            <small class="text-muted"> * Built by Ronan Christie * JS, CSS, Bootstrap * </small>
        </div>

        <div class="col-4"></div>

    </div>
</footer>
